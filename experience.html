<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Auréline Experience</title>
  <meta name="description" content="Discover the Auréline permanent jewellery experience.">
  <style>
    :root {
      --ivory:#f7f0e7;
      --ink:#2e2924;
      --gold:#ad7f38;
      --line:rgba(173,127,56,.28);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:var(--ivory);
      color:var(--ink);
      font-family:Arial, Helvetica, sans-serif;
    }
    main {
      width:min(1060px, 100%);
      margin:0 auto;
      padding:18px 14px 48px;
    }
    .artwork {
      display:block;
      width:100%;
      height:auto;
      box-shadow:0 18px 60px rgba(66,45,28,.14);
    }
    .website-link {
      text-align:center;
      padding:34px 16px 4px;
    }
    .website-link p {
      margin:0 0 18px;
      color:#7b6e63;
      font-size:15px;
    }
    .btn {
      display:inline-block;
      background:var(--gold);
      color:white;
      text-decoration:none;
      padding:15px 28px;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
      border:1px solid var(--gold);
    }
    .btn:hover { opacity:.9; }
    @media (max-width:600px) {
      main { padding:0 0 36px; }
      .artwork { box-shadow:none; }
      .website-link { padding:28px 18px 0; }
    }
  </style>
